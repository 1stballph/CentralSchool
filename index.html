<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Centralian Campus App</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Centralian Campus">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ===== Splash screen ===== */
    #splash {
      position: fixed;
      inset: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    /* ===== Golden loading rings ===== */
    .ring-wrap {
      position: relative;
      width: 230px;
      height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    /* outer golden ring — spins clockwise */
    .ring.r1 {
      inset: 0;
      border: 3px solid transparent;
      border-top-color: #d4a017;
      border-bottom-color: #f0c14b;
      animation: ringSpin 2.4s linear infinite;
    }

    /* inner golden ring — spins counter-clockwise */
    .ring.r2 {
      inset: 16px;
      border: 2.5px solid transparent;
      border-left-color: #b8860b;
      border-right-color: #ffd700;
      animation: ringSpin 1.7s linear infinite reverse;
    }

    /* golden ripple — expands outward and fades */
    .ring.r3 {
      inset: 32px;
      border: 2px solid rgba(212, 160, 23, 0.85);
      animation: ringRipple 2s ease-out infinite;
    }

    @keyframes ringSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes ringRipple {
      0%   { transform: scale(0.85); opacity: 0.9; }
      100% { transform: scale(1.45); opacity: 0; }
    }

    .app-logo {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      box-shadow: 0 8px 30px rgba(212, 160, 23, 0.35);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .app-name {
      margin-top: 22px;
      font-size: 24px;
      font-weight: 700;
      color: #0E6B4D;
      letter-spacing: 1px;
    }

    .app-sub {
      margin-top: 6px;
      font-size: 13px;
      color: #1F8A5B;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .loading-bar-wrap {
      margin-top: 30px;
      width: 180px;
      height: 5px;
      background: #E3F2EC;
      border-radius: 3px;
      overflow: hidden;
    }

    .loading-bar {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #52B788, #0E6B4D);
      border-radius: 3px;
      animation: slide 1.2s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(450%); }
    }

    /* ===== App frame ===== */
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #ffffff;
    }
  </style>
</head>
<body>

  <div id="splash">
    <div class="ring-wrap">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <img class="app-logo" src="icon-192.png" alt="Centralian Campus App">
    </div>
    <div class="app-name">Centralian Campus</div>
    <div class="app-sub">Dingle Central Elementary School</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
  </div>

  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbwVP5miFp7XBICauV1RghTaSxCzh2xsbCjMe3lNRIGiTPeOuALNEO9ItjYXwxx7aHcE/exec"
    allow="fullscreen"
    allowfullscreen
  ></iframe>

  <script>
    // Register Service Worker - required for real PWA install
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js')
          .then(function(reg) { console.log('SW registered:', reg.scope); })
          .catch(function(err) { console.log('SW failed:', err); });
      });
    }

    var frame = document.getElementById("app-frame");
    var splash = document.getElementById("splash");

    frame.onload = function() {
      setTimeout(function() {
        splash.style.opacity = "0";
        setTimeout(function() { splash.style.display = "none"; }, 600);
      }, 1000);
    };

    // Fallback: hide splash after 5s no matter what
    setTimeout(function() {
      splash.style.opacity = "0";
      setTimeout(function() { splash.style.display = "none"; }, 600);
    }, 5000);
  </script>

</body>
</html>
